# .github/workflows/produce-prebuilt.yml
#
# Produces the COMMITTABLE Way-B deliverable: the WebRTC AudioProcessing
# (AEC3) static library set, staged exactly as it will live in the repo at
#   android/src/main/cpp/prebuilt/arm64/lib/      (the archives)
#   android/src/main/cpp/prebuilt/arm64/include/  (the headers)
#
# WHY THIS EXISTS (Way B, locked): we commit a PREBUILT library and link it,
# instead of rebuilding the ~700-file C++ library on every app build. This
# workflow regenerates that prebuilt from the pinned vendored source, so the
# committed artifact is always reproducible from source.
#
# THE THIN-ARCHIVE GOTCHA (proven, handled here):
# Meson emits THIN static archives (header "!<thin>") that only REFERENCE
# their .o object files by path in the build tree. Copied out of the build
# tree, a thin archive is dead. And `ar x` refuses to operate on thin
# archives at all. So we do NOT extract. Instead, for each thin archive we
# read its member object paths with `ar t` and RE-ARCHIVE those objects into
# a real, self-contained ("!<arch>") fat archive that is safe to commit.
# The `ar t` paths are RELATIVE TO THE ARCHIVE'S OWN DIRECTORY, so each
# conversion runs from inside that directory.
#
# PROOF, NOT ABSENCE OF ERROR: after converting, this workflow RE-LINKS the
# real shim (aec3_shim.cpp) against the CONVERTED FAT archives and checks the
# four JNI symbols are exported. A green run means the exact bytes we upload
# (and will commit) are the exact bytes that link.
#
# Trigger: run it by hand from the Actions tab (workflow_dispatch).

name: Produce committable prebuilt (arm64)

on:
  workflow_dispatch:

jobs:
  produce:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: "27.0.12077973"
      ANDROID_API: "28"

    steps:
      - name: Check out this repo (vendored source + shim)
        uses: actions/checkout@v4

      - name: Install Meson and Ninja
        run: |
          pip install --upgrade meson ninja
          meson --version
          ninja --version

      - name: Set up the Android NDK (r27)
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Build the WebRTC APM from vendored source (sealed, offline)
        run: |
          cp -r third_party/webrtc-audio-processing wap
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          cat > wap/cross_linux_aarch64.ini <<EOF
          [constants]
          ndk_path    = '${NDK}'
          bin         = ndk_path + '/toolchains/llvm/prebuilt/linux-x86_64/bin/'
          toolchain   = bin + 'aarch64-linux-android'
          api         = '${ANDROID_API}'

          [host_machine]
          system      = 'android'
          cpu_family  = 'aarch64'
          cpu         = 'aarch64'
          endian      = 'little'

          [properties]
          sys_root        = ndk_path + '/sysroot'
          c_link_args     = ['-fuse-ld=lld', '-Wl,-z,max-page-size=16384', '-Wl,-z,common-page-size=16384']
          cpp_link_args   = ['-fuse-ld=lld', '-Wl,-z,max-page-size=16384', '-Wl,-z,common-page-size=16384']

          [binaries]
          c           = toolchain + api + '-clang'
          cpp         = toolchain + api + '-clang++'
          ar          = bin + 'llvm-ar'
          strip       = toolchain + '-strip'
          EOF
          cd wap
          meson setup build_arm64 \
            --cross-file cross_linux_aarch64.ini \
            --default-library=static \
            --buildtype=release \
            --wrap-mode=nodownload \
            -Dprefix=$PWD/install/arm64
          meson compile -C build_arm64
          meson install -C build_arm64

      - name: Build ONE fat archive from the real .o objects (proof-driven)
        run: |
          cd wap
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          AR="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          RANLIB="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"

          OUT="$GITHUB_WORKSPACE/prebuilt_staging/lib"
          mkdir -p "$OUT"

          # WHY THIS APPROACH (proven by the diag workflow):
          # Meson emits static archives whose members are stored as BARE
          # BASENAMES with no directory (e.g. `checks.cc.o`), while the real
          # objects live scattered across per-target `<lib>.a.p/` dirs. That
          # makes ar-member-path reconstruction impossible — the path info is
          # simply not in the archive. But the OBJECT FILES themselves are real
          # files on disk. So we ignore the .a wrappers entirely and archive the
          # actual objects. Every compiled object lives under a `*.a.p/` dir.
          echo "----- collecting every compiled object under *.a.p/ -----"
          find build_arm64 -type d -name '*.a.p' | sort
          OBJS=$(find build_arm64 -type f -path '*.a.p/*.o' | sort)
          NOBJ=$(printf '%s\n' "$OBJS" | grep -c . || true)
          echo "object count: $NOBJ"

          # HARD ASSERTION: a single archive cannot hold two members with the
          # same basename. Meson's flattened names (which encode the source
          # subdir) are unique by construction; prove it, don't assume it.
          NDISTINCT=$(printf '%s\n' "$OBJS" | xargs -n1 basename | sort -u | grep -c . || true)
          echo "distinct basenames: $NDISTINCT"
          if [ "$NOBJ" -ne "$NDISTINCT" ]; then
            echo "!! basename collision: $NOBJ objects but $NDISTINCT distinct names — a single fat archive would drop objects. Aborting."
            echo "----- the colliding basenames: -----"
            printf '%s\n' "$OBJS" | xargs -n1 basename | sort | uniq -d
            exit 1
          fi
          if [ "$NOBJ" -lt 200 ]; then
            echo "!! only $NOBJ objects found — implausibly low, the build tree layout may have changed. Aborting."
            exit 1
          fi

          echo "----- archiving $NOBJ objects into one fat static library -----"
          # rcs = replace, create, write symbol index. Real objects => fat.
          printf '%s\n' "$OBJS" | xargs "$AR" rcs "$OUT/libwebrtc-audio-processing-1.a"
          "$RANLIB" "$OUT/libwebrtc-audio-processing-1.a"

          echo "----- confirm result is a FAT self-contained archive -----"
          printf '%-45s ' "libwebrtc-audio-processing-1.a"; head -c 7 "$OUT/libwebrtc-audio-processing-1.a"; echo
          ls -la "$OUT"
          echo "----- member count inside the archive (must equal $NOBJ) -----"
          INCOUNT=$("$AR" t "$OUT/libwebrtc-audio-processing-1.a" | grep -c . || true)
          echo "members in archive: $INCOUNT"
          test "$INCOUNT" -eq "$NOBJ" || { echo "!! archive holds $INCOUNT members but we fed $NOBJ objects — mismatch. Aborting."; exit 1; }
          echo "----- spot-check: ar x must succeed (proves not thin) -----"
          mkdir /tmp/probe && (cd /tmp/probe && "$AR" x "$OUT/libwebrtc-audio-processing-1.a" && echo "ar x OK: $(ls | wc -l) objects extracted")

      - name: Stage the headers exactly as they will be committed
        run: |
          cd wap
          OUT="$GITHUB_WORKSPACE/prebuilt_staging/include"
          mkdir -p "$OUT"
          cp -r install/arm64/include/* "$OUT"/
          echo "----- staged include tree (top levels) -----"
          find "$OUT" -maxdepth 2 -type d | sort
          echo "----- sanity: the primary public header is present -----"
          find "$OUT" -name 'audio_processing.h' | sort

      - name: RE-LINK the shim against the ONE committable archive (the real proof)
        run: |
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          CXX="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${ANDROID_API}-clang++"
          NM="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm"

          STAGE="$GITHUB_WORKSPACE/prebuilt_staging"
          INC1="$STAGE/include/webrtc-audio-processing-1"
          INC2="$STAGE/include"
          SHIM="$GITHUB_WORKSPACE/android/src/main/cpp/aec3_shim.cpp"
          LIB="$STAGE/lib/libwebrtc-audio-processing-1.a"

          echo "----- linking shim against the single fat archive -----"
          ls -la "$LIB"

          # --start-group around the single archive lets the linker resolve any
          # circular references among the now co-located WebRTC + Abseil objects
          # regardless of member order inside the archive.
          "$CXX" -std=c++17 -fPIC -shared \
            -I"$INC1" -I"$INC2" \
            "$SHIM" \
            -Wl,--start-group "$LIB" -Wl,--end-group \
            -llog \
            -Wl,-z,max-page-size=16384 \
            -o /tmp/libsix_pages_voice_aec3.so
          echo "----- LINK AGAINST COMMITTABLE ARTIFACT SUCCEEDED -----"
          ls -la /tmp/libsix_pages_voice_aec3.so
          echo "----- confirm the four JNI symbols are exported -----"
          found=$("$NM" -D /tmp/libsix_pages_voice_aec3.so | grep -c "nativeCreate\|nativeProcessRender\|nativeProcessCapture\|nativeDestroy")
          echo "JNI symbols found: $found (expect 4)"
          test "$found" -eq 4 || { echo "!! expected 4 JNI symbols, got $found"; exit 1; }

      - name: Upload the committable prebuilt (lib/ + include/)
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-arm64
          path: prebuilt_staging/**
