# .github/workflows/prove-shim-link.yml
#
# Proves the AEC3 JNI shim (android/src/main/cpp/aec3_shim.cpp) COMPILES and
# LINKS against the WebRTC AudioProcessing library built from vendored source.
#
# It also produces the deliverable for Way B: a single fat static library
# (main APM + all Abseil objects bundled) plus headers, uploaded as an
# artifact to be committed under android/src/main/cpp/prebuilt/arm64/.
#
# Isolated: does NOT go through the plugin's Gradle. A green run means the
# shim's calls match the real library's symbols.
#
# Trigger: run it by hand from the Actions tab (workflow_dispatch).

name: Prove shim link (arm64)

on:
  workflow_dispatch:

jobs:
  prove:
    runs-on: ubuntu-latest

    env:
      ANDROID_API: "28"

    steps:
      - name: Check out this repo (vendored source + shim)
        uses: actions/checkout@v4

      - name: Install Meson and Ninja
        run: |
          pip install --upgrade meson ninja
          meson --version
          ninja --version

      - name: Set up the Android NDK (r27)
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Build the WebRTC APM from vendored source (sealed, offline)
        run: |
          cp -r third_party/webrtc-audio-processing wap
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          cat > wap/cross_linux_aarch64.ini <<EOF
          [constants]
          ndk_path    = '${NDK}'
          bin         = ndk_path + '/toolchains/llvm/prebuilt/linux-x86_64/bin/'
          toolchain   = bin + 'aarch64-linux-android'
          api         = '${ANDROID_API}'

          [host_machine]
          system      = 'android'
          cpu_family  = 'aarch64'
          cpu         = 'aarch64'
          endian      = 'little'

          [properties]
          sys_root        = ndk_path + '/sysroot'
          c_link_args     = ['-fuse-ld=lld', '-Wl,-z,max-page-size=16384', '-Wl,-z,common-page-size=16384']
          cpp_link_args   = ['-fuse-ld=lld', '-Wl,-z,max-page-size=16384', '-Wl,-z,common-page-size=16384']

          [binaries]
          c           = toolchain + api + '-clang'
          cpp         = toolchain + api + '-clang++'
          ar          = bin + 'llvm-ar'
          strip       = toolchain + '-strip'
          EOF
          cd wap
          meson setup build_arm64 \
            --cross-file cross_linux_aarch64.ini \
            --default-library=static \
            --buildtype=release \
            --wrap-mode=nodownload \
            -Dprefix=$PWD/install/arm64
          meson compile -C build_arm64
          meson install -C build_arm64

      - name: Compile + LINK the shim against ALL component archives (the proof)
        run: |
          cd wap
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          CXX="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${ANDROID_API}-clang++"
          INC1="$PWD/install/arm64/include/webrtc-audio-processing-1"
          INC2="$PWD/install/arm64/include"
          SHIM="$GITHUB_WORKSPACE/android/src/main/cpp/aec3_shim.cpp"

          echo "----- every .a the build produced -----"
          find build_arm64 install/arm64 -name '*.a' | sort

          # Gather every component archive (WebRTC parts + Abseil). Linkers
          # handle thin archives fine; only ar-extraction does not. Wrap them
          # in --start-group/--end-group so inter-archive symbol references
          # resolve regardless of order.
          LIBS=$(find build_arm64 -name '*.a' | sort)
          echo "----- linking shim against these -----"
          echo "$LIBS"

          "$CXX" -std=c++17 -fPIC -shared \
            -I"$INC1" -I"$INC2" \
            "$SHIM" \
            -Wl,--start-group $LIBS -Wl,--end-group \
            -llog \
            -Wl,-z,max-page-size=16384 \
            -o libsix_pages_voice_aec3.so
          echo "----- LINK SUCCEEDED -----"
          ls -la libsix_pages_voice_aec3.so
          echo "----- confirm our JNI symbols are exported -----"
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm" -D libsix_pages_voice_aec3.so | grep -i "nativeCreate\|nativeProcessRender\|nativeProcessCapture\|nativeDestroy" || echo "(no JNI symbols found — investigate)"

      - name: Upload the built .so and component libs (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: shim-link-proof-arm64
          path: |
            wap/libsix_pages_voice_aec3.so
            wap/build_arm64/**/*.a
            wap/install/arm64/include/**
